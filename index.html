<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CountDown Timer</title>
</head>
<body>
    <div class="main">
    <div class="container">
        <img src="gift.png" alt="">
        <h3 style="margin: 20px 0px; font-size: 1.9rem;">COMMING SOON!</h3>
        <p style="margin: 20px 0px; font-size: 1.3rem;">Reveal Time<p>18 Jan 2023 09:10:00 PM</p>
        <div class="timer">
            <div>
                <input id="days" type="text" ><br>
                <label style="padding: 0px 61.5px;" >DAYS</label>
            </div>
            <div>
                <input id="hours" type="text"><br>
                <label style="padding: 0px 55px;">HOURS</label>
            </div>
            <div>
                <input id="min" type="text" readonly><br>
                <label style="padding: 0px 43px;">MINUTES</label>
            </div>
            <div>
                <input id="sec" type="text" readonly><br>
                <label style="padding: 0px 49px;">SECOND</label>
            </div>
        </div>
    </div>
    </div>
    <script src="ct.js"></script>
</body>
</html>
